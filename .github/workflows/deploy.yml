name: Deploy Next.js to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js site
        run: npm run build

      - name: Add .nojekyll file
        run: touch ./out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './out'

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


      - name: Post-deploy smoke check
        env:
          DEPLOY_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          python3 - <<'PY'
          import os, sys, time, socket, urllib.request, urllib.error
          url = os.environ.get("DEPLOY_URL")
          if not url:
              print("DEPLOY_URL not set", file=sys.stderr)
              sys.exit(2)
          total_wait_seconds = 180
          delay_seconds = 5
          timeout_seconds = 10
          deadline = time.monotonic() + total_wait_seconds
          attempt = 0
          last = None
          while True:
              attempt += 1
              try:
                  req = urllib.request.Request(url, method="GET", headers={"User-Agent": "gh-actions-smoke"})
                  with urllib.request.urlopen(req, timeout=timeout_seconds) as resp:
                      code = resp.getcode()
                  print(f"Attempt {attempt}: HTTP {code}")
                  if 200 <= code < 400:
                      print("Smoke check passed")
                      sys.exit(0)
                  last = f"HTTP {code}"
              except urllib.error.HTTPError as e:
                  last = f"HTTPError {e.code}"
                  print(f"Attempt {attempt}: HTTPError {e.code}")
              except (urllib.error.URLError, TimeoutError, socket.timeout) as e:
                  last = str(e)
                  print(f"Attempt {attempt} error: {e}")
              except Exception:
                  raise
              if time.monotonic() >= deadline:
                  print(f"Smoke check failed: {url} (last: {last})", file=sys.stderr)
                  sys.exit(1)
              time.sleep(delay_seconds)
          PY
