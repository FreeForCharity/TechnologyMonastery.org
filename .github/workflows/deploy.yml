name: Deploy Next.js to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js site
        run: npm run build

      - name: Add .nojekyll file
        run: touch ./out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './out'

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


      - name: Post-deploy smoke check
        env:
          DEPLOY_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          python3 - <<'PY'
          import os, sys, time, urllib.request
      
          url = os.environ.get("DEPLOY_URL")
          if not url:
              print("DEPLOY_URL not set", file=sys.stderr)
              sys.exit(1)
      
          attempts = 12
          delay_seconds = 5
      
          for i in range(1, attempts + 1):
              try:
                  req = urllib.request.Request(url, method="GET", headers={"User-Agent": "gh-actions-smoke"})
                  with urllib.request.urlopen(req, timeout=20) as resp:
                      code = resp.getcode()
                  print(f"Attempt {i}/{attempts}: HTTP {code}")
                  if 200 <= code < 400:
                      print("Smoke check passed")
                      sys.exit(0)
              except Exception as e:
                  print(f"Attempt {i}/{attempts} error: {e}")
              if i < attempts:
                  time.sleep(delay_seconds)
      
          print(f"Smoke check failed: {url}", file=sys.stderr)
          sys.exit(1)
          PY
